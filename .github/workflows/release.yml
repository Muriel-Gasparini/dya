name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: dya-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: dya-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            asset: dya-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: dya-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun build --compile --target=${{ matrix.target }} bin/repeater.ts --outfile ${{ matrix.asset }}

      - run: tar czf ${{ matrix.asset }}.tar.gz ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
